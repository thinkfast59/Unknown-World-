name: Unknown World Reel Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg and Sinhala fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-noto-extra
          fc-cache -fv

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create reel
        env:
          PIXABAY_KEY: ${{ secrets.PIXABAY_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
        run: python horror_bot.py

      - name: Upload reel
        uses: actions/upload-artifact@v4
        with:
          name: unknown-world-reel
          path: |
            output/unknown_world_reel.mp4
            output/caption.txt
